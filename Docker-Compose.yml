version: '3.8'

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.Backend

    container_name: backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      # Cache del modelo de HuggingFace
      - hf_cache:/root/.cache/huggingface

      # Persistencia de la base vectorial ChromaDB
      - chroma_data:/app/chroma_db

    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.Frontend

    container_name: frontend

    ports:
      - "8501:8501"

    env_file:
      - .env

    depends_on:
      - backend

    restart: unless-stopped

volumes:
  # Cache del modelo de embeddings
  hf_cache:

  # Base vectorial persistente
  chroma_data: